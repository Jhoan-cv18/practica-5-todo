<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List | Práctica 5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Mi Lista de Tareas</h1>
      <p class="subtitle">Programación Web - Práctica 5</p>
    </header>

    <div class="input-section">
      <input
        type="text"
        id="todoInput"
        placeholder="Escribe una nueva tarea..."
        maxlength="100"
      />
      <button id="addBtn">Agregar</button>
    </div>

    <div class="stats">
      <span id="totalCount">0 tareas</span>
      <span id="completedCount">0 completadas</span>
    </div>

    <ul id="todoList"></ul>

    <div id="emptyState" class="empty-state">
      <p>No hay tareas aún. ¡Agrega una!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
